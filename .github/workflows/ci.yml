name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: Verify formatting and that unit tests are green
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Spotless check
        run: ./mvnw spotless:check --no-transfer-progress
      - name: Run unit tests
        run: ./mvnw clean test --batch-mode --no-transfer-progress

  auto-merge:
    runs-on: ubuntu-latest
    needs: verify
    if: github.actor == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: dependabot/fetch-metadata@v2
        id: fetch-metadata

      - name: Auto-merge patch and minor updates
        if: steps.fetch-metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.fetch-metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}