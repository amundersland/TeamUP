name: Merge Dependabot PRs

on:
  workflow_dispatch:

jobs:
  merge-dependabot-prs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Approve and squash-merge all open Dependabot PRs
        run: |
          prs=$(gh pr list --author "dependabot[bot]" --state open --json url --jq '.[].url')

          if [ -z "$prs" ]; then
            echo "No open Dependabot PRs found."
            exit 0
          fi

          for pr_url in $prs; do
            echo "Approving: $pr_url"
            gh pr review "$pr_url" --approve

            echo "Merging: $pr_url"
            gh pr merge "$pr_url" --squash --auto
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
