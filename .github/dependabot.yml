version: 2

updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "daily"
    rebase-strategy: "auto"
    open-pull-requests-limit: 5
    target-branch: "main"
    labels:
      - "dependencies"
      - "auto"
    versioning-strategy: "increase"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    rebase-strategy: "auto"
    open-pull-requests-limit: 3
    target-branch: "main"
    labels:
      - "dependencies"
      - "auto"
